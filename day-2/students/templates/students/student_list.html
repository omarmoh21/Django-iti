{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Students in {{ course.title }}</title>
    <link rel="stylesheet" href="{% static 'students/style.css' %}">
</head>
<body>

<div class="container">

    <h1>Students in {{ course.title }}</h1>

    <table>
        <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Email</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>
                {% if student.photo %}
                    <img src="{{ student.photo.url }}" alt="{{ student.name }}" width="50" style="border-radius:50%;">
                {% else %}
                    <img src="{% static 'students/images/default.png' %}" alt="Default" width="50" style="border-radius:50%;">
                {% endif %}
            </td>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
