<!DOCTYPE html>
<html>
<head>
    <title>Omar's Kitchen</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px;
        }

        h1 {
            text-align: center;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        input[type="text"] {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #555;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .category {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<h1>Omar's Kitchen</h1>

<div class="controls">

    <!-- Search Form -->
    <form method="GET">
        <input type="text" name="search" placeholder="Search food...">
        <button type="submit">Search</button>
    </form>

    <!-- Filter Buttons -->
    <div>
        <a href="/menu/"><button>All</button></a>
        <a href="/menu/?category=food"><button>Food</button></a>
        <a href="/menu/?category=drink"><button>Drinks</button></a>
    </div>

</div>

{% for item in items %}
<div class="card">
    <h2>{{ item.name }}</h2>
    <p>{{ item.description }}</p>
    <p class="category">Category: {{ item.category }}</p>
    <p class="price">{{ item.price }} EGP</p>
</div>
{% empty %}
<p style="text-align:center;">No items found.</p>
{% endfor %}

</body>
</html>
